<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Window</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 메인 메뉴 -->
  <div id="main-menu" class="menu-container">
    <h1>FACE WINDOW</h1>
    <div class="game-card" id="btn-face-window">
      <div class="card-icon">🪟</div>
      <h3>시작하기</h3>
      <p>얼굴 추적으로 창문 밖 3D 풍경을 감상하세요!</p>
    </div>
  </div>

  <!-- 얼굴 추적 창문 화면 -->
  <div id="face-window-screen" class="hidden">
    <div id="face-window-container"></div>
    <img id="face-window-frame" src="d43145518db11f068b8f4a7193fef700.jpg" alt="">
    <video id="face-window-video" autoplay playsinline muted style="display:none;"></video>
    <div id="face-window-ui">
      <div id="face-window-status">초기화 중...</div>
      <button id="home-face-window-btn">Menu</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Sky.js"></script>
  <script type="module" src="facewindow.js"></script>
</body>
</html>
