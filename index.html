<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ggulook Game Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
  <div class="header">
    <button id="theme-toggle">다크 모드로 전환</button>
  </div>

  <!-- 메인 메뉴 -->
  <div id="main-menu" class="menu-container">
    <h1>GGULOOK STUDIO</h1>
    <div class="game-selector">
      <div class="game-card" id="btn-ggulook-jump">
        <div class="card-icon">🦉</div>
        <h3>Ggulook Jump</h3>
        <p>이단 점프로 장애물을 피하세요!</p>
      </div>
      <div class="game-card" id="btn-ggulook-3d">
        <div class="card-icon">🏛️</div>
        <h3>Vatican Run 3D</h3>
        <p>바티칸의 장애물을 피하며 별을 모으세요!</p>
      </div>
    </div>
  </div>

  <!-- ggulook jump 게임 화면 -->
  <div id="game-screen" class="hidden">
    <!-- ... 기존 내용 ... -->
  </div>

  <!-- 3D 게임 화면 -->
  <div id="game-3d-screen" class="hidden">
    <div id="three-container"></div>
    <div id="ui-3d">
      <div id="score-3d">Score: 0</div>
      <div id="speed-indicator" class="hidden">SPEED BOOST!</div>
      <button id="home-3d-btn">Menu</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>
  <script src="game3d.js"></script>
</body>
</html>
